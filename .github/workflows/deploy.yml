name: Build and Deploy to EcowebHosting

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '11'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build for production
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    environment: production

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create combined .htaccess
        run: |
          cat > dist/.htaccess << 'HTACCESS'
          # BEGIN WordPress
          # WordPress .htaccess rules - preserve WP routing
          # END WordPress

          # Vue PWA - serve index.html for SPA routes
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /

            # Don't rewrite requests for wp-admin, wp-content, wp-includes, wp-json
            RewriteCond %{REQUEST_URI} ^/(wp-admin|wp-content|wp-includes|wp-json|wp-login|wp-cron|xmlrpc) [OR]
            RewriteCond %{REQUEST_FILENAME} -f [OR]
            RewriteCond %{REQUEST_FILENAME} -d
            RewriteRule ^ - [L]

            # Vue Router history mode fallback
            RewriteRule ^ index.html [L]
          </IfModule>

          # Security headers
          <IfModule mod_headers.c>
            Header set X-Content-Type-Options "nosniff"
            Header set X-Frame-Options "SAMEORIGIN"
            Header set X-XSS-Protection "1; mode=block"
            Header set Referrer-Policy "strict-origin-when-cross-origin"
          </IfModule>

          # Cache static assets
          <IfModule mod_expires.c>
            ExpiresActive On
            ExpiresByType text/html "access plus 1 hour"
            ExpiresByType text/css "access plus 1 month"
            ExpiresByType application/javascript "access plus 1 month"
            ExpiresByType image/png "access plus 1 year"
            ExpiresByType image/jpeg "access plus 1 year"
            ExpiresByType image/svg+xml "access plus 1 year"
            ExpiresByType application/json "access plus 0 seconds"
          </IfModule>

          # Gzip compression
          <IfModule mod_deflate.c>
            AddOutputFilterByType DEFLATE text/html text/plain text/css
            AddOutputFilterByType DEFLATE application/javascript application/json
            AddOutputFilterByType DEFLATE image/svg+xml
          </IfModule>

          # MIME types for PWA
          <IfModule mod_mime.c>
            AddType application/manifest+json .json
            AddType application/javascript .js
          </IfModule>
          HTACCESS

      - name: Create tarball
        run: |
          mkdir -p deploy
          tar -czf deploy/dist.tar.gz -C dist .

      - name: Deploy tarball via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy/
          server-dir: /home/u97404/domains/france.baseuse.xyz/public_ftp/
          protocol: ftp
          port: 21
